<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
</head>
<body>
    <div class="container" style="max-width:420px; margin:40px auto;">
        <div class="box">
            <h2 style="text-align:center; color:var(--bambu-green);">Welcome Back</h2>
            {% if error %}
            <div style="background:#ffe6e6; padding:10px; border-radius:6px; color:#661010; margin-bottom:10px;">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required autofocus>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <p style="text-align:center; margin-top:12px;">Don't have an account? <a href="/user_register">Create one</a></p>
            <p style="text-align:center; margin-top:6px;"><a href="/login">Admin Login</a></p>
        </div>
    </div>
</body>
</html>
